#
# Placeholders are written as tags without '%', e.g. <mine>, <input>, <label>.
# Do not remove these placeholder tags or values won't be substituted.

messages:

  # Shown when a console/non-player tries to use a player-only command
  only-players: "<red>Only players can use this command."

  # Shown when a player lacks permission to open the main GUI (/mine)
  no-permission: "<red>You do not have permission to use this command."

  # /mine reload
  no-permission-reload: "<red>You do not have permission to reload."
  reloaded: "<green>Mines and Config have been reloaded!"

  # Shown for an unrecognized subcommand
  # Placeholders: <input>
  unknown-subcommand: "<red>Unknown subcommand: <yellow><input>"

  # Shown when the command is used with an invalid number of arguments
  # Placeholders: <label>
  usage: "<red>Usage: /<label> [reload|reset|create|delete|disable|enable] [mine name]"

  # /mine reset <name>
  no-permission-reset: "<red>You do not have permission to reset mines."
  # Placeholders: <mine>
  mine-reset: "<green>Mine <mine> has been reset!"
  # Placeholders: <mine>
  mine-not-found: "<red>Mine <mine> not found!"

  # /mine create <name>
  no-permission-create: "<red>You do not have permission to create mines."
  only-players-create: "<red>Only players can create mines."
  # Placeholders: <mine>
  mine-already-exists: "<red>Mine <mine> already exists."
  no-selection: "<red>No Selection found! Use a Wooden Hoe to select 2 corners."

  # /mine delete <name>
  no-permission-delete: "<red>You do not have permission to delete mines."
  # Placeholders: <mine>
  mine-deleted: "<green>Mine <mine> has been deleted."

  # /mine disable <name>
  no-permission-disable: "<red>You do not have permission to disable mines."
  # Placeholders: <mine>
  mine-disabled: "<yellow>Disabled <mine>."

  # /mine enable <name>
  no-permission-enable: "<red>You do not have permission to enable mines."
  # Placeholders: <mine>
  mine-enabled: "<green>Enabled <mine>."